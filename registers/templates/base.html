<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Registro de Ponto{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        :root {
            --verde-escuro: #17623a;
            --verde-medio: #2f9e44;
            --verde-claro: #e9f8ee;
            --verde-hover: #135431;
            --texto: #21402f;
        }

        body {
            background: linear-gradient(135deg, #f6fff8 0%, #eef9f0 100%);
            color: var(--texto);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(90deg, var(--verde-escuro), var(--verde-medio));
            box-shadow: 0 6px 16px rgba(23, 98, 58, 0.2);
        }

        .btn-success {
            background-color: var(--verde-medio);
            border-color: var(--verde-medio);
        }

        .btn-success:hover {
            background-color: var(--verde-hover);
            border-color: var(--verde-hover);
        }

        .btn-outline-success {
            color: var(--verde-escuro);
            border-color: var(--verde-medio);
        }

        .btn-outline-success:hover {
            background-color: var(--verde-medio);
            color: white;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(23, 98, 58, 0.1);
        }

        .hero-card {
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-medio));
            color: white;
            border-radius: 20px;
            padding: 2rem;
        }

        .table thead {
            background-color: var(--verde-escuro);
            color: white;
        }

        .table td, .table th {
            vertical-align: middle;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #cfe9d6;
            padding: 0.75rem 0.95rem;
            min-height: 48px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--verde-medio);
            box-shadow: 0 0 0 0.2rem rgba(47, 158, 68, 0.25);
        }

        .form-label {
            margin-bottom: 0.45rem;
            color: var(--verde-escuro);
        }

        .badge-status {
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-open {
            background-color: #dff8e8;
            color: #17623a;
        }

        .badge-closed {
            background-color: #f3f4f6;
            color: #4b5563;
        }
    </style>
</head>
<body>
    {% block header %}
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'listar_funcionarios' %}">
                <i class="bi bi-clock-history me-2"></i>SCF Ponto
            </a>
            <div class="d-flex gap-2">
                <a class="btn btn-light text-success" href="{% url 'registrar_ponto' %}">Registrar ponto</a>
                <a class="btn btn-outline-light" href="{% url 'relatorio_pontos' %}">Relatórios</a>
            </div>
        </div>
    </nav>
    {% endblock %}

    <main class="py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="text-center py-4 text-muted">
        <small>Sistema de Controle de Frequência </small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
