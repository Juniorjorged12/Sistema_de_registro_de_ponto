services:
  - type: web
    name: sistema-registro-ponto
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-ponto-db
          property: connectionString

databases:
  - name: sistema-ponto-db
    plan: free
    databaseName: sistemapontodb
    user: sistemaponto
